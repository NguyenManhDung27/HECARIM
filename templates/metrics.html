{% extends "base.html" %}

{% block title %}Health Metrics{% endblock %}

{% block content %}
<div class="mb-4">
    <h1>Health Metrics</h1>
    <button class="btn btn-primary" onclick="showAddMetricsForm()">Add New Metrics</button>
</div>

<div class="grid">
    <!-- Blood Pressure Chart -->
    <div class="card">
        <h2>Blood Pressure</h2>
        <canvas id="bpChart"></canvas>
    </div>

    <!-- Heart Rate Chart -->
    <div class="card">
        <h2>Heart Rate</h2>
        <canvas id="hrChart"></canvas>
    </div>

    <!-- Blood Sugar Chart -->
    <div class="card">
        <h2>Blood Sugar</h2>
        <canvas id="bsChart"></canvas>
    </div>

    <!-- Weight Chart -->
    <div class="card">
        <h2>Weight</h2>
        <canvas id="weightChart"></canvas>
    </div>
</div>

<!-- Add Metrics Form Modal -->
<div id="metricsModal" class="modal" style="display: none;">
    <div class="modal-content card">
        <h2>Add New Metrics</h2>
        <form id="metricsForm" onsubmit="handleMetricsSubmit(event)">
            <div class="form-group">
                <label class="form-label">Blood Pressure</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <input type="number" class="form-control" id="systolic" placeholder="Systolic" required>
                    <input type="number" class="form-control" id="diastolic" placeholder="Diastolic" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="heartRate">Heart Rate (bpm)</label>
                <input type="number" class="form-control" id="heartRate" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="bloodSugar">Blood Sugar (mg/dL)</label>
                <input type="number" class="form-control" id="bloodSugar" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="weight">Weight (kg)</label>
                <input type="number" class="form-control" id="weight" step="0.1" required>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary">Save Metrics</button>
                <button type="button" class="btn btn-primary" onclick="hideAddMetricsForm()">Cancel</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
}

.modal-content {
    position: relative;
    margin: 15% auto;
    padding: 20px;
    width: 80%;
    max-width: 500px;
}
</style>

<script>
// Initialize charts
let bpChart, hrChart, bsChart, weightChart;

document.addEventListener('DOMContentLoaded', function() {
    initializeCharts();
    loadMetricsData();
});

function initializeCharts() {
    const commonOptions = {
        responsive: true,
        scales: {
            x: {
                type: 'time',
                time: {
                    unit: 'day'
                }
            }
        }
    };

    // Blood Pressure Chart
    bpChart = new Chart(document.getElementById('bpChart'), {
        type: 'line',
        data: {
            datasets: [
                {
                    label: 'Systolic',
                    borderColor: 'rgb(255, 99, 132)',
                    data: []
                },
                {
                    label: 'Diastolic',
                    borderColor: 'rgb(54, 162, 235)',
                    data: []
                }
            ]
        },
        options: commonOptions
    });

    // Heart Rate Chart
    hrChart = new Chart(document.getElementById('hrChart'), {
        type: 'line',
        data: {
            datasets: [{
                label: 'Heart Rate',
                borderColor: 'rgb(75, 192, 192)',
                data: []
            }]
        },
        options: commonOptions
    });

    // Blood Sugar Chart
    bsChart = new Chart(document.getElementById('bsChart'), {
        type: 'line',
        data: {
            datasets: [{
                label: 'Blood Sugar',
                borderColor: 'rgb(153, 102, 255)',
                data: []
            }]
        },
        options: commonOptions
    });

    // Weight Chart
    weightChart = new Chart(document.getElementById('weightChart'), {
        type: 'line',
        data: {
            datasets: [{
                label: 'Weight',
                borderColor: 'rgb(255, 159, 64)',
                data: []
            }]
        },
        options: commonOptions
    });
}

function loadMetricsData() {
    // TODO: Implement API call to fetch metrics data
    // For now, using sample data
    const sampleData = generateSampleData();
    updateCharts(sampleData);
}

function generateSampleData() {
    const data = [];
    const now = new Date();
    for (let i = 6; i >= 0; i--) {
        const date = new Date(now);
        date.setDate(date.getDate() - i);
        data.push({
            timestamp: date.toISOString(),
            bloodPressure: {
                systolic: Math.floor(Math.random() * (140 - 110) + 110),
                diastolic: Math.floor(Math.random() * (90 - 70) + 70)
            },
            heartRate: Math.floor(Math.random() * (100 - 60) + 60),
            bloodSugar: Math.floor(Math.random() * (140 - 80) + 80),
            weight: (Math.random() * (80 - 70) + 70).toFixed(1)
        });
    }
    return data;
}

function updateCharts(data) {
    // Update Blood Pressure Chart
    bpChart.data.datasets[0].data = data.map(d => ({
        x: d.timestamp,
        y: d.bloodPressure.systolic
    }));
    bpChart.data.datasets[1].data = data.map(d => ({
        x: d.timestamp,
        y: d.bloodPressure.diastolic
    }));
    bpChart.update();

    // Update Heart Rate Chart
    hrChart.data.datasets[0].data = data.map(d => ({
        x: d.timestamp,
        y: d.heartRate
    }));
    hrChart.update();

    // Update Blood Sugar Chart
    bsChart.data.datasets[0].data = data.map(d => ({
        x: d.timestamp,
        y: d.bloodSugar
    }));
    bsChart.update();

    // Update Weight Chart
    weightChart.data.datasets[0].data = data.map(d => ({
        x: d.timestamp,
        y: d.weight
    }));
    weightChart.update();
}

function showAddMetricsForm() {
    document.getElementById('metricsModal').style.display = 'block';
}

function hideAddMetricsForm() {
    document.getElementById('metricsModal').style.display = 'none';
}

async function handleMetricsSubmit(event) {
    event.preventDefault();

    const metricsData = {
        timestamp: new Date().toISOString(),
        bloodPressure: {
            systolic: parseInt(document.getElementById('systolic').value),
            diastolic: parseInt(document.getElementById('diastolic').value)
        },
        heartRate: parseInt(document.getElementById('heartRate').value),
        bloodSugar: parseInt(document.getElementById('bloodSugar').value),
        weight: parseFloat(document.getElementById('weight').value)
    };

    // TODO: Implement API call to save metrics
    console.log('Saving metrics:', metricsData);

    hideAddMetricsForm();
    loadMetricsData(); // Reload charts
}
</script>
{% endblock %}
