version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hecarim-mongodb-dev
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: devpassword
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - hecarim-network-dev
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend-dev
    container_name: hecarim-backend-dev
    restart: always
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://dev:devpassword@mongodb:27017/hecarim
      - JWT_SECRET=dev-secret-key
      - PORT=5000
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./back-end:/app/backend
      - /app/backend/node_modules
      - ./uploads:/app/backend/uploads
    networks:
      - hecarim-network-dev
    ports:
      - "5000:5000"
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend-dev
    container_name: hecarim-frontend-dev
    restart: always
    depends_on:
      - backend
    volumes:
      - ./front-end:/app/frontend
      - /app/frontend/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    networks:
      - hecarim-network-dev
    ports:
      - "3000:3000"
    command: npm start

networks:
  hecarim-network-dev:
    driver: bridge

volumes:
  mongodb_data_dev: