<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Bệnh Nhân Mới - Lễ Tân</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .form-section {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .buttons {
            text-align: center;
            margin-top: 20px;
        }
        .btn-primary {
            background: #00796b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-secondary {
            background: #grey;
            color: black;
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <img src="../assets/images/logo.png" alt="Logo" class="logo">
            <h3>Nhân Viên Lễ Tân</h3>
            <ul>
                <li><a href="dashboard.html">Trang Chính</a></li>
                <li><a href="schedule.html">Sắp Xếp Lịch Khám</a></li>
                <li><a href="patient-registration.html">Đăng Ký Bệnh Nhân</a></li>
                <li><a href="../index.html">Đăng Xuất</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h2>Đăng Ký Bệnh Nhân Mới</h2>
            
            <div class="form-container">
                <form id="patientRegistrationForm" onsubmit="return handleSubmit(event)">
                    <!-- Thông tin cá nhân -->
                    <div class="form-section">
                        <h3>Thông Tin Cá Nhân</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="fullName">Họ và Tên *</label>
                                <input type="text" id="fullName" name="fullName" required>
                            </div>
                            <div class="form-group">
                                <label for="gender">Giới Tính *</label>
                                <select id="gender" name="gender" required>
                                    <option value="">Chọn giới tính</option>
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="dateOfBirth">Ngày Sinh *</label>
                                <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                            </div>
                            <div class="form-group">
                                <label for="idNumber">CCCD/CMND *</label>
                                <input type="text" id="idNumber" name="idNumber" required>
                            </div>
                            <div class="form-group full-width">
                                <label for="address">Địa Chỉ *</label>
                                <input type="text" id="address" name="address" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Số Điện Thoại *</label>
                                <input type="tel" id="phone" name="phone" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email">
                            </div>
                        </div>
                    </div>

                    <!-- Thông tin y tế -->
                    <div class="form-section">
                        <h3>Thông Tin Y Tế</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="bloodType">Nhóm Máu</label>
                                <select id="bloodType" name="bloodType">
                                    <option value="">Chọn nhóm máu</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="allergies">Dị Ứng</label>
                                <input type="text" id="allergies" name="allergies" placeholder="VD: Penicillin, hải sản,...">
                            </div>
                            <div class="form-group">
                                <label for="chronicDiseases">Bệnh Mãn Tính</label>
                                <input type="text" id="chronicDiseases" name="chronicDiseases" placeholder="VD: Tiểu đường, huyết áp cao,...">
                            </div>
                            <div class="form-group">
                                <label for="familyHistory">Tiền Sử Gia Đình</label>
                                <input type="text" id="familyHistory" name="familyHistory">
                            </div>
                        </div>
                    </div>

                    <!-- Thông tin liên hệ khẩn cấp -->
                    <div class="form-section">
                        <h3>Thông Tin Liên Hệ Khẩn Cấp</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="emergencyName">Họ Tên *</label>
                                <input type="text" id="emergencyName" name="emergencyName" required>
                            </div>
                            <div class="form-group">
                                <label for="emergencyRelationship">Quan Hệ *</label>
                                <input type="text" id="emergencyRelationship" name="emergencyRelationship" required>
                            </div>
                            <div class="form-group">
                                <label for="emergencyPhone">Số Điện Thoại *</label>
                                <input type="tel" id="emergencyPhone" name="emergencyPhone" required>
                            </div>
                        </div>
                    </div>

                    <!-- Thông tin bảo hiểm -->
                    <div class="form-section">
                        <h3>Thông Tin Bảo Hiểm</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="insuranceProvider">Nhà Cung Cấp</label>
                                <input type="text" id="insuranceProvider" name="insuranceProvider">
                            </div>
                            <div class="form-group">
                                <label for="policyNumber">Số Thẻ Bảo Hiểm</label>
                                <input type="text" id="policyNumber" name="policyNumber">
                            </div>
                            <div class="form-group">
                                <label for="expiryDate">Ngày Hết Hạn</label>
                                <input type="date" id="expiryDate" name="expiryDate">
                            </div>
                        </div>
                    </div>

                    <div class="buttons">
                        <button type="button" class="btn-secondary" onclick="window.history.back()">Hủy</button>
                        <button type="submit" class="btn-primary">Đăng Ký</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function handleSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);

            // Cấu trúc dữ liệu theo schema
            const patientData = {
                patientId: 'PT' + Date.now(), // Tạo ID tạm thời
                personalInfo: {
                    fullName: formData.get('fullName'),
                    gender: formData.get('gender'),
                    dateOfBirth: formData.get('dateOfBirth'),
                    idNumber: formData.get('idNumber'),
                    address: formData.get('address'),
                    phone: formData.get('phone'),
                    email: formData.get('email'),
                    emergencyContact: {
                        name: formData.get('emergencyName'),
                        relationship: formData.get('emergencyRelationship'),
                        phone: formData.get('emergencyPhone')
                    }
                },
                healthInfo: {
                    bloodType: formData.get('bloodType'),
                    allergies: formData.get('allergies') ? formData.get('allergies').split(',').map(item => item.trim()) : [],
                    chronicDiseases: formData.get('chronicDiseases') ? formData.get('chronicDiseases').split(',').map(item => item.trim()) : [],
                    familyMedicalHistory: formData.get('familyHistory')
                },
                insurance: {
                    provider: formData.get('insuranceProvider'),
                    policyNumber: formData.get('policyNumber'),
                    expiryDate: formData.get('expiryDate')
                }
            };

            try {
                const response = await fetch('/api/patients', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(patientData)
                });

                if (response.ok) {
                    alert('Đăng ký bệnh nhân thành công!');
                    window.location.href = 'dashboard.html';
                } else {
                    const error = await response.json();
                    alert(`Lỗi: ${error.message}`);
                }
            } catch (error) {
                alert('Có lỗi xảy ra khi đăng ký bệnh nhân');
                console.error('Error:', error);
            }

            return false;
        }
    </script>
</body>
</html>
