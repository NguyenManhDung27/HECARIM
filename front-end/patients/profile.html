<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Cá Nhân</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #004d40;
        }
        .btn-edit {
            float: right;
            margin-bottom: 10px;
        }
        .emergency-contact {
            border-left: 3px solid #00796b;
            padding-left: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <img src="../assets/images/logo.png" alt="Logo" class="logo">
            <h3>Bệnh Nhân</h3>
            <ul>
                <li><a href="dashboard.html">Trang Chính</a></li>
                <li><a href="profile.html">Thông Tin Cá Nhân</a></li>
                <li><a href="medical-records.html">Hồ Sơ Khám Bệnh</a></li>
                <li><a href="../index.html">Đăng Xuất</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h2>Thông Tin Cá Nhân</h2>

            <!-- Thông tin cơ bản -->
            <div class="card">
                <h3>Thông Tin Cơ Bản</h3>
                <button class="btn-edit">Chỉnh Sửa</button>
                <form>
                    <div class="form-group">
                        <label>Mã Bệnh Nhân:</label>
                        <input type="text" value="BN001" readonly>
                    </div>
                    <div style="display: flex; gap: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Họ và tên:</label>
                            <input type="text" value="Nguyễn Văn A">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Ngày sinh:</label>
                            <input type="date" value="1990-01-01">
                        </div>
                    </div>
                    <div style="display: flex; gap: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Giới tính:</label>
                            <select>
                                <option value="nam">Nam</option>
                                <option value="nu">Nữ</option>
                                <option value="khac">Khác</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Nhóm máu:</label>
                            <select>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Thông tin liên hệ -->
            <div class="card">
                <h3>Thông Tin Liên Hệ</h3>
                <button class="btn-edit">Chỉnh Sửa</button>
                <form>
                    <div class="form-group">
                        <label>Số điện thoại:</label>
                        <input type="tel" value="0123 456 789">
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" value="nguyenvana@email.com">
                    </div>
                    <div class="form-group">
                        <label>Địa chỉ:</label>
                        <input type="text" value="123 Đường ABC, Phường XYZ">
                    </div>
                    <div style="display: flex; gap: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Quận/Huyện:</label>
                            <input type="text" value="Quận 1">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Thành phố:</label>
                            <input type="text" value="TP.HCM">
                        </div>
                    </div>
                </form>
            </div>

            <!-- Thông tin khẩn cấp -->
            <div class="card">
                <h3>Thông Tin Liên Hệ Khẩn Cấp</h3>
                <button class="btn-edit">Chỉnh Sửa</button>
                <div class="emergency-contact">
                    <form>
                        <div class="form-group">
                            <label>Họ tên người liên hệ:</label>
                            <input type="text" value="Nguyễn Thị B">
                        </div>
                        <div class="form-group">
                            <label>Mối quan hệ:</label>
                            <input type="text" value="Vợ/Chồng">
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại:</label>
                            <input type="tel" value="0987 654 321">
                        </div>
                    </form>
                </div>
            </div>

            <!-- Thông tin bảo hiểm -->
            <div class="card">
                <h3>Thông Tin Bảo Hiểm</h3>
                <button class="btn-edit">Chỉnh Sửa</button>
                <form>
                    <div style="display: flex; gap: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Số thẻ BHYT:</label>
                            <input type="text" value="BH123456789">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Ngày hết hạn:</label>
                            <input type="date" value="2025-12-31">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nơi đăng ký KCB ban đầu:</label>
                        <input type="text" value="Bệnh viện ABC">
                    </div>
                </form>
            </div>

            <!-- Cài đặt tài khoản -->
            <div class="card">
                <h3>Cài Đặt Tài Khoản</h3>
                <button class="btn-edit">Thay Đổi</button>
                <form>
                    <div class="form-group">
                        <label>Tên đăng nhập:</label>
                        <input type="text" value="nguyenvana" readonly>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu:</label>
                        <input type="password" value="********">
                    </div>
                    <div class="form-group">
                        <label>Ngôn ngữ:</label>
                        <select>
                            <option value="vi">Tiếng Việt</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nhận thông báo qua:</label>
                        <div>
                            <input type="checkbox" id="notify-email" checked>
                            <label for="notify-email">Email</label>
                            <input type="checkbox" id="notify-sms" checked>
                            <label for="notify-sms">SMS</label>
                        </div>
                    </div>
                </form>
            </div>

            <button style="margin-top: 20px; width: 200px;">Lưu Thay Đổi</button>
        </div>
    </div>
</body>
</html>
